name: Spellcheck

on:
  pull_request:
    paths:
      - "README.md"
      - "cspell.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/spellcheck.yml"
  workflow_dispatch:

jobs:
  cspell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run cspell
        run: npm run spellcheck
